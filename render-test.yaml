services:
  # ── Test Web Service ──
  - type: web
    name: fotasco-payroll-test
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate --noinput
    startCommand: |
      python manage.py shell -c "from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin', 'admin@fotasco.com', 'FotascoAdmin123!', role='admin')" &&
      gunicorn fotasco_payroll.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: fotasco-db-test
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
      - key: PAYSTACK_WEBHOOK_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Test Celery Worker ──
  - type: worker
    name: celery-worker-test
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools
      pip install -r requirements.txt
    startCommand: celery -A fotasco_payroll worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fotasco-db-test
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: fotasco-payroll-test
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false

  # ── Test Celery Beat ──
  - type: worker
    name: celery-beat-test
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools
      pip install -r requirements.txt
    startCommand: celery -A fotasco_payroll beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fot